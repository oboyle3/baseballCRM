<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}GAA Manager{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FFC20E;
    --green: #169B62;
    --dark: #0d1117;
    --darker: #080c10;
    --card: #131920;
    --card2: #1a2332;
    --border: #253040;
    --text: #e8edf2;
    --muted: #7a8fa6;
    --red: #e04444;
    --win: #169B62;
    --loss: #e04444;
    --draw: #FFC20E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(22,155,98,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,194,14,0.05) 0%, transparent 50%);
  }

  h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

  nav {
    background: rgba(8,12,16,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .nav-brand {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--saffron);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .nav-brand .badge {
    background: var(--green);
    color: white;
    font-size: 0.55rem;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.15em;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .nav-links a:hover { color: var(--text); background: var(--card); }
  .nav-links a.active { color: var(--saffron); }

  .main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

  .page-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .page-header .eyebrow {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 0.5rem;
  }

  .page-header h1 { font-size: 2rem; color: var(--text); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 1.4rem;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--green);
    color: white;
  }
  .btn-primary:hover { background: #1db571; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(22,155,98,0.3); }

  .btn-saffron {
    background: var(--saffron);
    color: var(--dark);
    font-weight: 700;
  }
  .btn-saffron:hover { background: #ffd040; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--saffron); color: var(--saffron); }

  .btn-danger {
    background: var(--red);
    color: white;
  }
  .btn-danger:hover { background: #c03333; }

  .badge-result {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .badge-W { background: rgba(22,155,98,0.2); color: var(--win); border: 1px solid rgba(22,155,98,0.3); }
  .badge-L { background: rgba(224,68,68,0.2); color: var(--loss); border: 1px solid rgba(224,68,68,0.3); }
  .badge-D { background: rgba(255,194,14,0.2); color: var(--draw); border: 1px solid rgba(255,194,14,0.3); }

  .rating-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .rating-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .overall-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
  }

  .overall-elite { background: rgba(255,194,14,0.2); color: var(--saffron); border: 1px solid rgba(255,194,14,0.3); }
  .overall-good { background: rgba(22,155,98,0.2); color: var(--green); border: 1px solid rgba(22,155,98,0.3); }
  .overall-avg { background: rgba(122,143,166,0.2); color: var(--muted); border: 1px solid rgba(122,143,166,0.3); }

  .grid { display: grid; gap: 1.5rem; }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  .messages-container { margin-bottom: 1.5rem; }
  .message {
    padding: 0.8rem 1.2rem;
    border-radius: 8px;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    border-left: 3px solid;
  }
  .message-success { background: rgba(22,155,98,0.1); border-color: var(--green); color: #7fe8b0; }
  .message-error { background: rgba(224,68,68,0.1); border-color: var(--red); color: #f08080; }
  .message-info { background: rgba(255,194,14,0.1); border-color: var(--saffron); color: var(--saffron); }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 0.75rem 0.8rem;
    border-bottom: 1px solid rgba(37,48,64,0.5);
    font-size: 0.9rem;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .trophy { color: var(--saffron); }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }
  .text-saffron { color: var(--saffron); }
  .text-red { color: var(--red); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  select, input[type=text], input[type=password], input[type=number] {
    background: var(--darker);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { outline: none; border-color: var(--green); }
  label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); display: block; margin-bottom: 0.4rem; }

  .field { margin-bottom: 1rem; }

  @media (max-width: 768px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    nav { padding: 0 1rem; }
    .nav-links { gap: 0; }
    .nav-links a { padding: 0.4rem 0.5rem; font-size: 0.75rem; }
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
<nav>
  <a href="{% url 'dashboard' %}" class="nav-brand">
    ⬡ GAA MANAGER <span class="badge">SIM</span>
  </a>
  <ul class="nav-links">
    <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'squad' %}">Squad</a></li>
    <li><a href="{% url 'logout' %}">Sign Out</a></li>
  </ul>
</nav>
{% endif %}

<div class="main">
  {% if messages %}
  <div class="messages-container">
    {% for message in messages %}
    <div class="message message-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
